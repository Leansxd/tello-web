<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tello OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- FULLSCREEN 3D CANVAS -->
        <div id="canvas-container"></div>
        
        <!-- FLOATING UI LAYER -->
        <div id="ui-layer">
            
            <!-- TOP BAR (TELEMETRY) -->
            <header class="hud-top">
                <div class="logo">TELLO <span>OS</span></div>
                <div class="telemetry">
                    <div class="stat"><span>STATE</span> <strong id="drone-status">OFFLINE</strong></div>
                    <div class="stat"><span>ALT</span> <strong id="stat-alt">0.0m</strong></div>
                    <div class="stat"><span>SPD</span> <strong id="stat-spd">0.0 m/s</strong></div>
                    <div class="stat"><span>YAW</span> <strong id="stat-yaw">0°</strong></div>
                    <div class="stat">
                        <span>PWR</span> 
                        <div class="bat-bar"><div id="stat-bat" style="width: 100%;"></div></div>
                    </div>
                </div>
            </header>

            <!-- ENVIRONMENT SELECTOR (TOP RIGHT) -->
            <div class="env-selector">
                <select onchange="window.changeEnv(this.value)">
                    <option value="hangar">T-01 Hangar (Night)</option>
                    <option value="desert">T-02 Desert Sand</option>
                    <option value="nature">T-03 Forest Green</option>
                </select>
            </div>

            <!-- LEFT PANEL (LOGS) -->
            <aside class="hud-left">
                <div class="panel-header">TERMINAL</div>
                <div id="ai-logs" class="logs">
                    <div class="log-entry system">Tello OS initialized. Waiting for connection...</div>
                </div>
            </aside>

            <!-- RIGHT PANEL (WAYPOINTS) -->
            <aside class="hud-right">
                <div class="panel-header">WAYPOINTS</div>
                <div id="object-list" class="waypoint-list">
                    <!-- Dynamic List -->
                </div>
                <div class="side-panel-footer">
                    <input type="file" id="map-loader" accept=".json" style="display: none;" onchange="window.loadMapFile(event)">
                    <button class="btn-save" onclick="document.getElementById('map-loader').click()" style="margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">LOAD MAP</button>
                    <button class="btn-save" onclick="window.saveMap()">SAVE MAP</button>
                </div>
            </aside>

            <!-- BOTTOM CENTER (MAP EDITOR DOCK) -->
            <div class="hud-bottom-center">
                <div class="dock">
                    <button onclick="window.openDesigner('UP')">ADD UP</button>
                    <button onclick="window.openDesigner('DOWN')">ADD DOWN</button>
                    <button onclick="window.openDesigner('LEFT')">ADD LEFT</button>
                    <button onclick="window.openDesigner('RIGHT')">ADD RIGHT</button>
                    <button onclick="window.openDesigner('FIRE')" class="fire-btn">ADD FIRE</button>
                    <button onclick="window.openDesigner('CUSTOM_WALL')" style="color: var(--accent);">ADD CUSTOM</button>
                </div>
            </div>

            <!-- BOTTOM RIGHT (CONTROLS) -->
            <div class="hud-bottom-right">
                <button class="btn-primary" onclick="window.droneAction('takeoff')">LAUNCH</button>
                <button class="btn-danger" onclick="window.droneAction('land')">ABORT</button>
            </div>
            
        </div>
    </div>
    <!-- OBJECT DESIGNER POPUP -->
    <div id="designer-popup" class="popup-overlay hidden">
        <div class="designer-content">
            <header class="designer-header">
                <h3>OBJECT DESIGNER</h3>
                <button class="close-popup" onclick="window.closeDesigner()">×</button>
            </header>
            <div class="designer-body">
                <div class="designer-preview" id="designer-preview-canvas">
                    <!-- 3D Preview will be here -->
                </div>
                <div class="designer-controls">
                    <div class="input-group">
                        <label>WALL WIDTH (m)</label>
                        <input type="range" id="wall-width" min="2" max="20" step="1" value="10">
                        <span class="val-display">10m</span>
                    </div>
                    <div class="input-group">
                        <label>WALL HEIGHT (m)</label>
                        <input type="range" id="wall-height" min="1" max="10" step="1" value="4">
                        <span class="val-display">4m</span>
                    </div>
                    <div class="input-group" id="icon-size-group">
                        <label>IMAGE SIZE (m)</label>
                        <input type="range" id="icon-size" min="0.5" max="10" step="0.5" value="3">
                        <span class="val-display">3m</span>
                    </div>
                    <div class="input-group">
                        <label>WALL COLOR</label>
                        <input type="color" id="wall-color" value="#444444" oninput="window.updateDesignerPreview()" style="width: 100%; height: 40px; cursor: pointer; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;">
                    </div>
                    <div class="input-group">
                        <label>OBJECT TYPE</label>
                        <select id="icon-type" onchange="window.updateDesignerPreview()">
                            <option value="UP">UP ARROW ICON</option>
                            <option value="DOWN">DOWN ARROW ICON</option>
                            <option value="LEFT">LEFT ARROW ICON</option>
                            <option value="RIGHT">RIGHT ARROW ICON</option>
                            <option value="FIRE">FIRE ICON</option>
                            <option value="CUSTOM_ICON">CUSTOM ICON (IMAGE)</option>
                            <option value="CUSTOM_WALL">CUSTOM WALL (FULL TEXTURE)</option>
                        </select>
                    </div>
                    <div id="custom-input-container" class="hidden">
                        <div class="input-group">
                            <label>IMAGE URL</label>
                            <input type="text" id="custom-icon-url" placeholder="https://..." onchange="window.updateDesignerPreview()">
                        </div>
                        <div style="text-align: center; margin: 10px 0; color: #666; font-size: 0.7rem; font-weight: 800;">OR</div>
                        <div class="input-group">
                            <label>UPLOAD FROM PC</label>
                            <input type="file" id="custom-icon-file" accept="image/*" onchange="window.handleFileUpload(event)" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; color: white; cursor: pointer;">
                        </div>
                    </div>
                    <div class="designer-hint">
                        <p>💡 Tip: Click & Drag icon on the wall to position it!</p>
                    </div>
                </div>
            </div>
            <footer class="designer-footer">
                <button class="btn-cancel" onclick="window.closeDesigner()">CANCEL</button>
                <button class="btn-confirm" onclick="window.confirmDesign()">ADD TO WORLD</button>
            </footer>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
