<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tello Mission Control v2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div id="app">
        <!-- ÜST PANEL: TELEMETRİ -->
        <header class="mission-header">
            <div class="logo">TELLO MISSION<span>CONTROL</span></div>
            <div class="telemetry-bar">
                <div class="stat"><label>STATUS:</label> <span id="drone-status">DISCONNECTED</span></div>
                <div class="stat"><label>ALT:</label> <span id="stat-alt">0.0m</span></div>
                <div class="stat"><label>SPD:</label> <span id="stat-spd">0.0 m/s</span></div>
                <div class="stat"><label>BAT:</label> <div class="bat-track"><div id="stat-bat" style="width: 85%;"></div></div></div>
            </div>
        </header>

        <!-- ANA İÇERİK: 3D VE PANELLER -->
        <main class="main-layout">
            <!-- SOL PANEL: MAP EDITOR -->
            <aside class="side-panel left-panel">
                <div class="scroll-area">
                    <div class="panel-header">MAP EDITOR</div>
                    <div class="editor-tools">
                        <button onclick="window.addLevelObj('yukari')">+ WALL (UP)</button>
                        <button onclick="window.addLevelObj('asagi')">+ ROOF (DOWN)</button>
                        <button onclick="window.addLevelObj('fire')">+ TARGET (FIRE)</button>
                    </div>
                    <div id="object-list" class="object-grid">
                        <!-- Dinamik nesne listesi buraya gelecek -->
                    </div>
                </div>
                <button class="save-btn" onclick="window.saveMap()">SAVE MISSION MAP</button>
            </aside>

            <!-- MERKEZ: 3D VIEW -->
            <div id="canvas-container"></div>

            <!-- SAĞ PANEL: AI LOGS & CONTROLS -->
            <aside class="side-panel right-panel">
                <div class="scroll-area">
                    <div class="panel-header">AI LOGS</div>
                    <div id="ai-logs" class="log-container">
                        <div class="log-entry system">System initialized. Waiting for drone...</div>
                    </div>
                </div>

                <div class="manual-controls">
                    <div class="panel-header">REMOTE CONTROL</div>
                    <div class="control-grid">
                        <button class="takeoff-btn" onclick="window.droneAction('takeoff')">TAKEOFF</button>
                        <button class="land-btn" onclick="window.droneAction('land')">LAND</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
